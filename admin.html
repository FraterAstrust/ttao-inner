<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTAO — Sysadmin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="sidebar-overlay" id="sidebar-overlay"></div>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-emblem" aria-hidden="true">
            <svg width="32" height="32" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                <circle cx="32" cy="32" r="30" fill="none" stroke="rgba(212,175,55,0.5)" stroke-width="0.8"/>
                <polygon points="32,8 56,48 8,48" fill="none" stroke="rgba(212,175,55,0.6)" stroke-width="0.8"/>
                <polygon points="32,56 8,16 56,16" fill="none" stroke="rgba(0,209,255,0.35)" stroke-width="0.8"/>
                <circle cx="32" cy="32" r="3" fill="rgba(212,175,55,0.5)"/>
            </svg>
        </div>
        <div>
            <div class="sidebar-title">TTAO</div>
            <div class="sidebar-role">Sysadmin</div>
        </div>
    </div>

    <ul class="sidebar-nav">
        <li><button class="nav-item active" data-panel="articles">
            <span class="nav-icon">📜</span><span>Articles</span>
        </button></li>
        <li><button class="nav-item" data-panel="lessons">
            <span class="nav-icon">⚗</span><span>Lesson Modules</span>
        </button></li>
        <li><button class="nav-item" data-panel="labs">
            <span class="nav-icon">🧪</span><span>Lab Guides</span>
        </button></li>
        <li><button class="nav-item" data-panel="cybermancy">
            <span class="nav-icon">⌬</span><span>Cybermancy</span>
        </button></li>
        <li><button class="nav-item" data-panel="students">
            <span class="nav-icon">👤</span><span>Students</span>
        </button></li>
        <li><button class="nav-item" data-panel="preview">
            <span class="nav-icon">👁</span><span>Preview</span>
        </button></li>
        <li><button class="nav-item" data-panel="backup">
            <span class="nav-icon">💾</span><span>Backup</span>
        </button></li>
    </ul>

    <div class="sidebar-footer">
        <button class="logout-btn" id="logout-btn">⬡ Sign Out</button>
    </div>
</nav>

<div class="main-wrap">
    <header class="dash-header">
        <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">☰</button>
        <div class="dash-header-title">Inner Academy — Administration</div>
        <div class="dash-admin-badge">ASTRUST</div>
    </header>
    <main class="dash-content" id="dash-content"></main>
</div>

<script>
// ── AUTH ──
function getCookie(name) {
    const m = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
    return m ? m[2] : null;
}
function parseJWT(token) {
    try { return JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); }
    catch { return null; }
}
const adminToken = getCookie('ttao_admin');
if (!adminToken) { window.location.href = '/auth/admin'; }
const adminPayload = parseJWT(adminToken);
if (!adminPayload || adminPayload.role !== 'admin') { window.location.href = '/auth/admin'; }

// ── CONTENT TYPE CONFIG ──
const CONTENT_TYPES = {
    articles:   { label: 'Articles',           singular: 'Article',    eyebrow: 'Content' },
    lessons:    { label: 'Lesson Modules',     singular: 'Lesson',     eyebrow: 'Curriculum' },
    labs:       { label: 'Lab Guides',         singular: 'Lab Guide',  eyebrow: 'Laboratory' },
    cybermancy: { label: 'Glyphic Cybermancy', singular: 'Entry',      eyebrow: 'Cybermancy' },
};

// ── SIDEBAR ──
function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
}
function openSidebar() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebar-overlay').classList.add('open');
}

// ── API ──
async function api(path, options = {}) {
    const res = await fetch(path, {
        ...options,
        headers: { 'Content-Type': 'application/json', ...options.headers },
    });
    if (!res.ok) throw new Error(`API error ${res.status}`);
    return res.json();
}

// ── NAV ──
function setActiveNav(id) {
    document.querySelectorAll('.nav-item').forEach(btn =>
        btn.classList.toggle('active', btn.dataset.panel === id));
}

function showPanel(id) {
    setActiveNav(id);
    if (CONTENT_TYPES[id]) {
        renderContentList(id);
    } else if (id === 'students') {
        renderStudents();
    } else if (id === 'preview') {
        renderPreview();
    } else if (id === 'backup') {
        renderBackup();
    }
    if (window.innerWidth <= 768) closeSidebar();
}

// ── CONTENT LIST (shared for all 4 types) ──
async function renderContentList(type) {
    const ct = CONTENT_TYPES[type];
    const el = document.getElementById('dash-content');
    el.innerHTML = `<div class="panel fade-in">
        <div class="panel-eyebrow">${ct.eyebrow}</div>
        <div class="panel-header-row">
            <h1 class="panel-title">${ct.label}</h1>
            <button class="btn btn-gold" id="new-btn">+ New ${ct.singular}</button>
        </div>
        <div id="content-wrap"><div class="loading">Loading...</div></div>
    </div>`;

    document.getElementById('new-btn').addEventListener('click', () => renderEditor(null, type));

    try {
        const items = await api(`/.netlify/functions/admin-articles?contentType=${type}`);
        const wrap = document.getElementById('content-wrap');

        if (!items.length) {
            wrap.innerHTML = `<p class="empty-state">No ${ct.label.toLowerCase()} yet. Create your first one.</p>`;
            return;
        }

        // Extra column header per type
        const xHead = type === 'lessons'    ? '<th>Module</th>'
                    : type === 'labs'       ? '<th>Bulletin</th>'
                    : type === 'cybermancy' ? '<th>Glyph</th>'
                    : '';

        wrap.innerHTML = `<table class="data-table">
            <thead><tr>
                <th>Title</th>${xHead}
                <th>Tier</th><th>Status</th><th>Updated</th><th></th>
            </tr></thead>
            <tbody>
            ${items.map(a => {
                const xCell = type === 'lessons'    ? `<td class="td-date">${a.moduleNumber  || '—'}</td>`
                            : type === 'labs'       ? `<td class="td-date">${a.bulletinNumber || '—'}</td>`
                            : type === 'cybermancy' ? `<td class="td-date">${a.glyph         || '—'}</td>`
                            : '';
                return `<tr>
                    <td class="td-title">${a.title}</td>${xCell}
                    <td><span class="tier-pill tier-${a.tier}">${a.tier}</span></td>
                    <td><span class="status-pill ${a.published ? 'published' : 'draft'}">${a.published ? 'Published' : 'Draft'}</span></td>
                    <td class="td-date">${new Date(a.updatedAt).toLocaleDateString()}</td>
                    <td class="td-actions">
                        <button class="action-btn" data-action="edit" data-id="${a.id}">Edit</button>
                        <button class="action-btn danger" data-action="delete" data-id="${a.id}" data-title="${a.title}">Delete</button>
                    </td>
                </tr>`;
            }).join('')}
            </tbody>
        </table>`;

        wrap.addEventListener('click', async e => {
            const btn = e.target.closest('[data-action]');
            if (!btn) return;
            if (btn.dataset.action === 'edit') renderEditor(btn.dataset.id, type);
            if (btn.dataset.action === 'delete') {
                if (!confirm(`Delete "${btn.dataset.title}"?`)) return;
                await api(`/.netlify/functions/admin-articles?id=${btn.dataset.id}`, { method: 'DELETE' });
                renderContentList(type);
            }
        });
    } catch (err) {
        document.getElementById('content-wrap').innerHTML =
            `<p class="error-state">Failed to load: ${err.message}</p>`;
    }
}

// ── EDITOR (shared for all types) ──
async function renderEditor(id, contentType = 'articles') {
    const ct = CONTENT_TYPES[contentType];
    setActiveNav(contentType);

    // Type-specific extra field
    const extraField =
        contentType === 'lessons' ? `
            <div class="field field-sm">
                <label class="field-label">Module Number</label>
                <input type="text" id="ed-extra" class="field-input" placeholder="Module I">
            </div>` :
        contentType === 'labs' ? `
            <div class="field field-sm">
                <label class="field-label">Bulletin Number</label>
                <input type="text" id="ed-extra" class="field-input" placeholder="Bulletin No. 1">
            </div>` :
        contentType === 'cybermancy' ? `
            <div class="field field-sm">
                <label class="field-label">Glyph Symbol</label>
                <input type="text" id="ed-extra" class="field-input" placeholder="+ summ">
            </div>` : '';

    document.getElementById('dash-content').innerHTML = `
        <div class="panel fade-in">
            <div class="panel-eyebrow">${id ? 'Edit' : 'New'} ${ct.singular}</div>
            <div class="editor-form">
                <div class="field-row">
                    <div class="field">
                        <label class="field-label">Title</label>
                        <input type="text" id="ed-title" class="field-input" placeholder="${ct.singular} title">
                    </div>
                    ${extraField}
                    <div class="field field-sm">
                        <label class="field-label">Minimum Tier</label>
                        <select id="ed-tier" class="field-input">
                            <option value="tyro">Tyro (Free)</option>
                            <option value="initiate">Initiate ($5)</option>
                            <option value="adept">Adept ($15)</option>
                        </select>
                    </div>
                    <div class="field field-sm">
                        <label class="field-label">Status</label>
                        <select id="ed-published" class="field-input">
                            <option value="false">Draft</option>
                            <option value="true">Published</option>
                        </select>
                    </div>
                </div>
                <div class="gate-hint">
                    Use <code>[gate:initiate]</code> or <code>[gate:adept]</code> on its own line to progressively gate content within this ${ct.singular.toLowerCase()}.
                </div>
                <div class="editor-cols">
                    <div class="editor-col">
                        <label class="field-label">Markdown</label>
                        <textarea id="ed-content" class="md-input" placeholder="Write in markdown...&#10;&#10;[gate:initiate]&#10;Content for initiates and above...&#10;&#10;[gate:adept]&#10;Content for adepts only..."></textarea>
                    </div>
                    <div class="editor-col">
                        <label class="field-label">Preview</label>
                        <div id="ed-preview" class="md-preview"></div>
                    </div>
                </div>
                <div class="editor-actions">
                    <button class="btn btn-gold" id="ed-save">Save ${ct.singular}</button>
                    <button class="btn btn-outline" id="ed-cancel">Cancel</button>
                    <span class="save-status" id="save-status"></span>
                </div>
            </div>
        </div>`;

    const titleEl    = document.getElementById('ed-title');
    const contentEl  = document.getElementById('ed-content');
    const tierEl     = document.getElementById('ed-tier');
    const pubEl      = document.getElementById('ed-published');
    const previewEl  = document.getElementById('ed-preview');
    const extraEl    = document.getElementById('ed-extra');

    // Load existing item
    if (id) {
        try {
            const item = await api(`/.netlify/functions/admin-articles?id=${id}`);
            titleEl.value = item.title;
            contentEl.value = item.content;
            tierEl.value = item.tier;
            pubEl.value = String(item.published);
            if (extraEl) {
                extraEl.value = item.moduleNumber || item.bulletinNumber || item.glyph || '';
            }
            previewEl.innerHTML = renderEditorPreview(item.content);
        } catch {
            document.getElementById('save-status').textContent = 'Failed to load item.';
        }
    }

    // Live preview with gate visualization
    contentEl.addEventListener('input', () => {
        previewEl.innerHTML = renderEditorPreview(contentEl.value);
    });

    // Save
    document.getElementById('ed-save').addEventListener('click', async () => {
        const status = document.getElementById('save-status');
        const extraVal = extraEl?.value.trim() || '';
        const extraData =
            contentType === 'lessons'    ? { moduleNumber:   extraVal } :
            contentType === 'labs'       ? { bulletinNumber: extraVal } :
            contentType === 'cybermancy' ? { glyph:          extraVal } : {};

        const payload = {
            title:       titleEl.value.trim(),
            content:     contentEl.value,
            tier:        tierEl.value,
            published:   pubEl.value === 'true',
            contentType,
            ...extraData,
        };

        if (!payload.title || !payload.content) {
            status.textContent = 'Title and content are required.'; return;
        }

        status.textContent = 'Saving...';
        try {
            if (id) {
                await api(`/.netlify/functions/admin-articles?id=${id}`, { method: 'PUT', body: JSON.stringify(payload) });
            } else {
                await api('/.netlify/functions/admin-articles', { method: 'POST', body: JSON.stringify(payload) });
            }
            status.textContent = '✓ Saved';
            setTimeout(() => renderContentList(contentType), 800);
        } catch (err) {
            status.textContent = `Error: ${err.message}`;
        }
    });

    document.getElementById('ed-cancel').addEventListener('click', () => renderContentList(contentType));
}

// ── EDITOR PREVIEW: visualize gate markers instead of hiding content ──
function renderEditorPreview(content) {
    const processed = content.replace(
        /^\[gate:(tyro|initiate|adept)\]$/gm,
        (_, t) => `\n<div class="gate-marker">⚿ ${t.toUpperCase()} GATE — content below requires ${t}</div>\n`
    );
    return marked.parse(processed);
}

// ── STUDENTS ──
async function renderStudents() {
    const el = document.getElementById('dash-content');
    el.innerHTML = `<div class="panel fade-in">
        <div class="panel-eyebrow">Registry</div>
        <h1 class="panel-title">Students</h1>
        <div id="students-wrap"><div class="loading">Loading...</div></div>
    </div>`;

    try {
        const students = await api('/.netlify/functions/admin-students');
        const wrap = document.getElementById('students-wrap');

        if (!students.length) {
            wrap.innerHTML = `<p class="empty-state">No students have logged in yet.</p>`; return;
        }

        wrap.innerHTML = `<table class="data-table">
            <thead><tr>
                <th>Name</th><th>Email</th><th>Patreon ID</th><th>Tier</th><th>Last Seen</th><th>Override</th>
            </tr></thead>
            <tbody>
            ${students.map(s => `<tr>
                <td>${s.name || '—'}</td>
                <td class="td-email">${s.email || '—'}</td>
                <td class="td-id"><code style="font-size:0.75rem;opacity:0.7;font-family:'Courier New',monospace">${s.userId || '—'}</code></td>
                <td>
                    <select class="tier-select" data-id="${s.userId}">
                        <option value="tyro"     ${s.tier === 'tyro'     ? 'selected' : ''}>Tyro</option>
                        <option value="initiate" ${s.tier === 'initiate' ? 'selected' : ''}>Initiate</option>
                        <option value="adept"    ${s.tier === 'adept'    ? 'selected' : ''}>Adept</option>
                    </select>
                </td>
                <td class="td-date">${new Date(s.lastSeen).toLocaleDateString()}</td>
                <td>${s.tierOverride ? '<span class="override-badge">Manual</span>' : '—'}</td>
            </tr>`).join('')}
            </tbody>
        </table>`;

        wrap.querySelectorAll('.tier-select').forEach(sel => {
            sel.addEventListener('change', async () => {
                try {
                    await api(`/.netlify/functions/admin-students?id=${sel.dataset.id}`, {
                        method: 'PUT', body: JSON.stringify({ tier: sel.value }),
                    });
                    sel.style.borderColor = 'var(--gold)';
                    setTimeout(() => sel.style.borderColor = '', 1500);
                } catch (err) { alert('Failed to update tier: ' + err.message); }
            });
        });
    } catch (err) {
        document.getElementById('students-wrap').innerHTML =
            `<p class="error-state">Failed to load students: ${err.message}</p>`;
    }
}

// ── BACKUP ──
function renderBackup() {
    document.getElementById('dash-content').innerHTML = `
        <div class="panel fade-in">
            <div class="panel-eyebrow">Data</div>
            <h1 class="panel-title">Backup & Restore</h1>

            <div class="backup-section">
                <h2 class="backup-heading">Export</h2>
                <p class="backup-desc">Download all published and draft content as a JSON file. Keep this safe — it can restore your entire academy to any hosting environment.</p>
                <button class="btn btn-gold" id="export-btn">⬇ Download Backup</button>
                <span class="save-status" id="export-status"></span>
            </div>

            <div class="backup-section">
                <h2 class="backup-heading">Import</h2>
                <p class="backup-desc">Restore content from a previously exported backup file. Choose <strong>Merge</strong> to add to existing content, or <strong>Replace</strong> to wipe and restore.</p>
                <div style="display:flex;gap:0.8rem;align-items:center;flex-wrap:wrap;margin-bottom:0.8rem">
                    <input type="file" id="import-file" accept=".json" class="file-input">
                    <select id="import-mode" class="field-input" style="flex:0 0 140px">
                        <option value="merge">Merge</option>
                        <option value="replace">Replace All</option>
                    </select>
                    <button class="btn btn-outline" id="import-btn">⬆ Import</button>
                </div>
                <span class="save-status" id="import-status"></span>
            </div>

            <div class="backup-section">
                <h2 class="backup-heading">Watermark Decoder</h2>
                <p class="backup-desc">If content is leaked, paste the copied text below. Invisible zero-width characters embedded in every article will reveal the member's Patreon ID.</p>
                <textarea id="wm-input" class="md-input" style="min-height:120px;margin-bottom:0.8rem" placeholder="Paste leaked text here..."></textarea>
                <button class="btn btn-outline" id="wm-decode-btn">Decode Watermark</button>
                <div id="wm-result" style="margin-top:0.8rem;font-family:'Cinzel',serif;font-size:0.8rem;color:var(--gold-dim)"></div>
            </div>
        </div>`;

    // Export
    document.getElementById('export-btn').addEventListener('click', async () => {
        const status = document.getElementById('export-status');
        status.textContent = 'Preparing export...';
        try {
            const res = await fetch('/.netlify/functions/admin-export');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const blob = await res.blob();
            const date = new Date().toISOString().split('T')[0];
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `ttao-backup-${date}.json`;
            a.click(); URL.revokeObjectURL(url);
            status.textContent = '✓ Downloaded';
        } catch (err) {
            status.textContent = `Error: ${err.message}`;
        }
    });

    // Import
    document.getElementById('import-btn').addEventListener('click', async () => {
        const status = document.getElementById('import-status');
        const file = document.getElementById('import-file').files[0];
        const mode = document.getElementById('import-mode').value;
        if (!file) { status.textContent = 'Select a backup file first.'; return; }
        if (mode === 'replace' && !confirm('Replace ALL content with this backup? This cannot be undone.')) return;
        status.textContent = 'Importing...';
        try {
            const text = await file.text();
            const data = JSON.parse(text);
            const res = await fetch('/.netlify/functions/admin-export', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: data.content, mode }),
            });
            const result = await res.json();
            status.textContent = `✓ Imported ${result.imported} items${result.errors?.length ? ` (${result.errors.length} errors)` : ''}`;
        } catch (err) {
            status.textContent = `Error: ${err.message}`;
        }
    });

    // Watermark decoder
    document.getElementById('wm-decode-btn').addEventListener('click', () => {
        const text = document.getElementById('wm-input').value;
        const result = document.getElementById('wm-result');
        const zw = text.replace(/[^\u200B\u200C\u200D]/g, '');
        if (!zw) { result.textContent = 'No watermark found in pasted text.'; return; }
        try {
            const parts = zw.split('\u200D');
            const decoded = parts.map(part => {
                const binary = part.split('').map(c => c === '\u200C' ? '1' : '0').join('');
                if (binary.length < 8) return '';
                return String.fromCharCode(parseInt(binary, 2));
            }).join('');
            result.innerHTML = decoded
                ? `Patreon User ID: <strong style="color:var(--text-bright)">${decoded}</strong>`
                : 'Could not decode — watermark may be incomplete.';
        } catch {
            result.textContent = 'Decode failed.';
        }
    });
}

// ── PREVIEW ──
function renderPreview() {
    document.getElementById('dash-content').innerHTML = `
        <div class="panel fade-in">
            <div class="panel-eyebrow">Preview</div>
            <h1 class="panel-title">View Site As</h1>
            <p style="opacity:0.7;margin-bottom:1.8rem;font-style:italic;max-width:520px">
                Open the student dashboard as a specific membership tier to verify content visibility, gating, and layout before publishing.
            </p>
            <div style="display:flex;gap:1rem;flex-wrap:wrap">
                <a href="/dashboard?preview_tier=tyro"     target="_blank" rel="noopener" class="btn btn-outline">View as Tyro</a>
                <a href="/dashboard?preview_tier=initiate" target="_blank" rel="noopener" class="btn btn-gold">View as Initiate</a>
                <a href="/dashboard?preview_tier=adept"    target="_blank" rel="noopener" class="btn btn-cyan">View as Adept</a>
            </div>
            <div style="margin-top:2.5rem;padding-top:1.5rem;border-top:1px solid var(--border)">
                <div class="panel-eyebrow" style="margin-bottom:0.8rem">Gate Syntax Reference</div>
                <p style="opacity:0.7;font-size:0.9rem;margin-bottom:0.8rem">Use these markers on their own line in any article to progressively gate content:</p>
                <pre style="background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:1rem;font-size:0.82rem;line-height:1.8;color:var(--text-bright);overflow-x:auto"># Article Title

This section is visible to everyone.

[gate:initiate]
This section requires Initiate membership or above.

[gate:adept]
This section requires Adept membership only.</pre>
            </div>
        </div>`;
}

// ── INIT ──
document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => showPanel(btn.dataset.panel));
});

document.getElementById('logout-btn').addEventListener('click', () => {
    document.cookie = 'ttao_admin=; Path=/; Max-Age=0';
    window.location.href = '/';
});

document.getElementById('menu-toggle').addEventListener('click', openSidebar);
document.getElementById('sidebar-overlay').addEventListener('click', closeSidebar);

showPanel('articles');
</script>
</body>
</html>
