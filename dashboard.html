<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Inner Academy — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<div class="bg-geometry" aria-hidden="true">
    <svg class="geo-svg" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
        <circle cx="300" cy="300" r="260" fill="none" stroke="rgba(212,175,55,0.05)" stroke-width="1"/>
        <circle cx="300" cy="300" r="190" fill="none" stroke="rgba(212,175,55,0.04)" stroke-width="1"/>
        <circle cx="300" cy="300" r="120" fill="none" stroke="rgba(212,175,55,0.03)" stroke-width="1"/>
        <polygon points="300,60 540,450 60,450" fill="none" stroke="rgba(212,175,55,0.06)" stroke-width="1"/>
        <polygon points="300,540 60,150 540,150" fill="none" stroke="rgba(0,209,255,0.03)" stroke-width="1"/>
    </svg>
</div>

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-emblem" aria-hidden="true">
            <svg width="36" height="36" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                <circle cx="32" cy="32" r="30" fill="none" stroke="rgba(212,175,55,0.5)" stroke-width="0.8"/>
                <polygon points="32,8 56,48 8,48" fill="none" stroke="rgba(212,175,55,0.6)" stroke-width="0.8"/>
                <polygon points="32,56 8,16 56,16" fill="none" stroke="rgba(0,209,255,0.35)" stroke-width="0.8"/>
                <circle cx="32" cy="32" r="3" fill="rgba(212,175,55,0.5)"/>
            </svg>
        </div>
        <div class="sidebar-title">TTAO</div>
    </div>

    <div class="sidebar-tier" id="sidebar-tier">
        <!-- Populated by JS -->
    </div>

    <ul class="sidebar-nav" id="sidebar-nav">
        <!-- Populated by JS -->
    </ul>

    <div class="sidebar-footer">
        <button class="logout-btn" id="logout-btn">⬡ Sign Out</button>
    </div>
</nav>

<!-- MAIN -->
<div class="main-wrap">

    <header class="dash-header">
        <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">☰</button>
        <div class="dash-header-title" id="dash-header-title">The Inner Academy</div>
        <div class="dash-user" id="dash-user">
            <!-- Populated by JS -->
        </div>
    </header>

    <main class="dash-content" id="dash-content">
        <!-- Populated by JS -->
    </main>

</div>

<script>
// ── JWT DECODE (no library needed for reading payload) ──
function parseJWT(token) {
    try {
        const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
        return JSON.parse(atob(base64));
    } catch {
        return null;
    }
}

function getCookie(name) {
    const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
    return match ? match[2] : null;
}

// ── TIER CONFIG ──
const TIERS = {
    tyro: {
        label: 'Tyro',
        color: 'var(--text-dim)',
        nav: [
            { icon: '⌂', label: 'Welcome', id: 'welcome' },
            { icon: '📜', label: 'Articles', id: 'articles' },
            { icon: '⬡', label: 'Upgrade', id: 'upgrade' },
        ]
    },
    initiate: {
        label: 'Initiate',
        color: 'var(--gold-dim)',
        nav: [
            { icon: '⌂', label: 'Welcome', id: 'welcome' },
            { icon: '📜', label: 'Articles', id: 'articles' },
            { icon: '⚗', label: 'Lesson Modules', id: 'lessons' },
            { icon: '🔗', label: 'Discord', id: 'discord' },
            { icon: '⬡', label: 'Upgrade', id: 'upgrade' },
        ]
    },
    adept: {
        label: 'Adept',
        color: 'var(--gold)',
        nav: [
            { icon: '⌂', label: 'Welcome', id: 'welcome' },
            { icon: '📜', label: 'Articles', id: 'articles' },
            { icon: '⚗', label: 'Lesson Modules', id: 'lessons' },
            { icon: '🧪', label: 'Lab Guides', id: 'labs' },
            { icon: '⌬', label: 'Glyphic Cybermancy', id: 'cybermancy' },
            { icon: '🔗', label: 'Discord', id: 'discord' },
            { icon: '🦡', label: 'Stoat Community', id: 'stoat' },
        ]
    }
};

// ── CONTENT PANELS ──
const CONTENT = {
    welcome: (user, tier) => `
        <div class="panel fade-in">
            <div class="panel-eyebrow">Welcome</div>
            <h1 class="panel-title">Salve, ${user.name || 'Soror/Frater'}.</h1>
            <p class="panel-lead">You have entered the Inner Academy of the Ternary Alchemical Order as a <strong>${TIERS[tier].label}</strong>. The Great Work awaits.</p>
            ${tier === 'tyro' ? `
            <div class="upgrade-notice">
                <p>Unlock the full curriculum — lesson modules, lab guides, and community access — by upgrading your Patreon membership.</p>
                <a href="https://www.patreon.com/Astrust" class="btn btn-gold" target="_blank" rel="noopener">Upgrade on Patreon</a>
            </div>` : ''}
            ${tier === 'initiate' ? `
            <div class="upgrade-notice">
                <p>Adept tier unlocks lab guides, Glyphic Cybermancy modules, and the Stoat community.</p>
                <a href="https://www.patreon.com/Astrust" class="btn btn-gold" target="_blank" rel="noopener">Become an Adept</a>
            </div>` : ''}
        </div>`,

    articles: (user, tier) => `
        <div class="panel fade-in">
            <div class="panel-eyebrow">Articles</div>
            <h1 class="panel-title">The Aletheion Archive</h1>
            <p class="panel-lead">Foundational writings of the Order, open to all enrolled students.</p>
            <div class="card-grid">
                ${articleCard('On the Nature of the Three Principles', 'An introduction to Sulfur, Mercury, and Salt as the pillars of alchemical philosophy.')}
                ${articleCard('The Silent Vigil', 'The practice of daily contemplative observation as the first discipline of the Work.')}
                ${articleCard('Ora et Labore', 'Prayer and Work — the dual obligations of the sincere student.')}
                ${tier === 'tyro' ? lockedCard('Plant Alchemy — First Operations', 'Upgrade to Initiate to unlock.') : articleCard('Plant Alchemy — First Operations', 'An overview of spagyric method applied to the plant kingdom.')}
                ${tier === 'tyro' ? lockedCard('The Astrological Wheel', 'Upgrade to Initiate to unlock.') : articleCard('The Astrological Wheel', 'Mapping planetary correspondences across the twelve houses.')}
            </div>
        </div>`,

    lessons: (user, tier) => `
        <div class="panel fade-in">
            <div class="panel-eyebrow">Lesson Modules</div>
            <h1 class="panel-title">The Curriculum</h1>
            <p class="panel-lead">Structured study modules progressing from foundation to advanced practice.</p>
            <div class="card-grid">
                ${moduleCard('Module I', 'Foundations of Alchemy', 'The Three Principles, the Four Elements, and the philosophical framework of the Work.')}
                ${moduleCard('Module II', 'Plant Kingdom', 'Spagyric extraction, fermentation, and the preparation of plant stones.')}
                ${moduleCard('Module III', 'Planetary Correspondences', 'Linking metals, plants, and timing to the seven classical planets.')}
                ${tier === 'adept' ? moduleCard('Module IV', 'Animal Kingdom', 'Advanced operations within the animal realm.') : lockedCard('Module IV — Animal Kingdom', 'Upgrade to Adept to unlock.')}
                ${tier === 'adept' ? moduleCard('Module V', 'Metal Alchemy', 'The transmutation of metals and the preparation of metallic medicines.') : lockedCard('Module V — Metal Alchemy', 'Upgrade to Adept to unlock.')}
            </div>
        </div>`,

    labs: (user, tier) => `
        <div class="panel fade-in">
            <div class="panel-eyebrow">Laboratory Guides</div>
            <h1 class="panel-title">The Alchemical Laboratories</h1>
            <p class="panel-lead">Step-by-step practical bulletins for Plant, Animal, and Metal operations.</p>
            <div class="card-grid">
                ${moduleCard('Bulletin No. 1', 'Plant — Introductory Operations', 'First extraction procedures and the preparation of the Plant Stone.')}
                ${moduleCard('Bulletin No. 2', 'Spagyric Tinctures', 'Full process from maceration through calcination and cohobation.')}
                ${moduleCard('Bulletin No. 3', 'Animal Kingdom — Introductory', 'First operations within the animal realm.')}
                ${moduleCard('Bulletin No. 4', 'Metal Operations', 'High-temperature work at 1750°C — Ora et Labore.')}
            </div>
        </div>`,

    cybermancy: (user, tier) => `
        <div class="panel fade-in">
            <div class="panel-eyebrow">Glyphic Cybermancy</div>
            <h1 class="panel-title">The Cybermantic System</h1>
            <p class="panel-lead">Custom-engineered systems blending alchemical symbolism and digital technology.</p>
            <div class="glyph-grid">
                ${glyphCard('+ summ', 'Fusion', 'The operation of synthesis — combining two principles into a unified whole.')}
                ${glyphCard('∆ memo', 'Memory', 'Encoding and preserving essential signatures across transformations.')}
                ${glyphCard('Σ stru', 'Structure', 'The scaffolding upon which all cybermantic operations are built.')}
                ${glyphCard('◎ circ', 'Circulation', 'The recycling of essence through iterative refinement.')}
            </div>
        </div>`,

    discord: (user, tier) => `
        <div class="panel fade-in">
            <div class="panel-eyebrow">Community</div>
            <h1 class="panel-title">Discord Sanctums</h1>
            <p class="panel-lead">Gated channels for enrolled students of the Order.</p>
            <div class="link-card">
                <div class="link-card-icon">💬</div>
                <div class="link-card-body">
                    <div class="link-card-title">Join the Discord</div>
                    <div class="link-card-desc">Access tier-gated channels for discussion, questions, and community practice.</div>
                    <a href="#" class="btn btn-cyan" target="_blank" rel="noopener">Open Discord</a>
                </div>
            </div>
        </div>`,

    stoat: (user, tier) => `
        <div class="panel fade-in">
            <div class="panel-eyebrow">Community</div>
            <h1 class="panel-title">Stoat Community</h1>
            <p class="panel-lead">The Order's home on Stoat — reserved for Adept members.</p>
            <div class="link-card">
                <div class="link-card-icon">🦡</div>
                <div class="link-card-body">
                    <div class="link-card-title">Join the Stoat</div>
                    <div class="link-card-desc">Deeper discussion, long-form posts, and archival lore for advanced students.</div>
                    <a href="#" class="btn btn-cyan" target="_blank" rel="noopener">Open Stoat</a>
                </div>
            </div>
        </div>`,

    upgrade: (user, tier) => `
        <div class="panel fade-in">
            <div class="panel-eyebrow">Upgrade</div>
            <h1 class="panel-title">Advance Your Degree</h1>
            <p class="panel-lead">Deepen your access to the Work.</p>
            <div class="upgrade-grid">
                ${tier === 'tyro' ? `
                <div class="upgrade-card highlight">
                    <div class="upgrade-tier">Initiate</div>
                    <div class="upgrade-price">$5 <span>/mo</span></div>
                    <ul class="upgrade-perks">
                        <li>All Tyro content</li>
                        <li>Full lesson modules</li>
                        <li>Step-by-step alchemical guides</li>
                        <li>Gated Discord channels</li>
                    </ul>
                    <a href="https://www.patreon.com/Astrust" class="btn btn-gold" target="_blank">Become an Initiate</a>
                </div>` : ''}
                <div class="upgrade-card ${tier === 'initiate' ? 'highlight' : ''}">
                    <div class="upgrade-tier">Adept</div>
                    <div class="upgrade-price">$15 <span>/mo</span></div>
                    <ul class="upgrade-perks">
                        <li>All Initiate content</li>
                        <li>Full lab guide bulletins</li>
                        <li>Glyphic Cybermancy modules</li>
                        <li>Stoat community access</li>
                    </ul>
                    <a href="https://www.patreon.com/Astrust" class="btn btn-gold" target="_blank">Become an Adept</a>
                </div>
            </div>
        </div>`,
};

// ── CARD HELPERS ──
function articleCard(title, desc) {
    return `<div class="card"><div class="card-title">${title}</div><div class="card-desc">${desc}</div><a href="#" class="card-link">Read →</a></div>`;
}
function moduleCard(label, title, desc) {
    return `<div class="card"><div class="card-label">${label}</div><div class="card-title">${title}</div><div class="card-desc">${desc}</div><a href="#" class="card-link">Begin →</a></div>`;
}
function lockedCard(title, reason) {
    return `<div class="card card-locked"><div class="lock-icon">⚿</div><div class="card-title">${title}</div><div class="card-desc">${reason}</div></div>`;
}
function glyphCard(glyph, name, desc) {
    return `<div class="glyph-card"><div class="glyph-symbol">${glyph}</div><div class="glyph-name">${name}</div><div class="glyph-desc">${desc}</div></div>`;
}

// ── INIT ──
function init() {
    const token = getCookie('ttao_session');

    if (!token) {
        window.location.href = '/?auth=required';
        return;
    }

    const payload = parseJWT(token);

    if (!payload || payload.exp * 1000 < Date.now()) {
        window.location.href = '/?auth=expired';
        return;
    }

    const tier = payload.tier || 'tyro';
    const tierConfig = TIERS[tier];

    // Sidebar tier badge
    document.getElementById('sidebar-tier').innerHTML = `
        <span class="tier-badge" style="color:${tierConfig.color}">
            ${tierConfig.label}
        </span>`;

    // Sidebar nav
    const nav = document.getElementById('sidebar-nav');
    nav.innerHTML = tierConfig.nav.map(item => `
        <li>
            <button class="nav-item" data-panel="${item.id}">
                <span class="nav-icon">${item.icon}</span>
                <span class="nav-label">${item.label}</span>
            </button>
        </li>`).join('');

    // User header
    document.getElementById('dash-user').innerHTML = `
        <span class="user-name">${payload.name || payload.email || 'Student'}</span>`;

    // Nav click handler
    let active = 'welcome';
    function showPanel(id) {
        active = id;
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.panel === id);
        });
        document.getElementById('dash-content').innerHTML = CONTENT[id]
            ? CONTENT[id](payload, tier)
            : `<div class="panel"><p>Coming soon.</p></div>`;
    }

    nav.addEventListener('click', e => {
        const btn = e.target.closest('.nav-item');
        if (btn) showPanel(btn.dataset.panel);
    });

    // Logout
    document.getElementById('logout-btn').addEventListener('click', () => {
        document.cookie = 'ttao_session=; Path=/; Max-Age=0';
        window.location.href = '/';
    });

    // Mobile menu toggle
    document.getElementById('menu-toggle').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('open');
    });

    // Initial panel
    showPanel('welcome');
}

document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
