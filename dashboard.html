<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Inner Academy — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<div class="bg-geometry" aria-hidden="true">
    <svg class="geo-svg" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
        <circle cx="300" cy="300" r="260" fill="none" stroke="rgba(212,175,55,0.05)" stroke-width="1"/>
        <circle cx="300" cy="300" r="190" fill="none" stroke="rgba(212,175,55,0.04)" stroke-width="1"/>
        <circle cx="300" cy="300" r="120" fill="none" stroke="rgba(212,175,55,0.03)" stroke-width="1"/>
        <polygon points="300,60 540,450 60,450" fill="none" stroke="rgba(212,175,55,0.06)" stroke-width="1"/>
        <polygon points="300,540 60,150 540,150" fill="none" stroke="rgba(0,209,255,0.03)" stroke-width="1"/>
    </svg>
</div>

<div class="sidebar-overlay" id="sidebar-overlay"></div>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-emblem" aria-hidden="true">
            <svg width="36" height="36" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                <circle cx="32" cy="32" r="30" fill="none" stroke="rgba(212,175,55,0.5)" stroke-width="0.8"/>
                <polygon points="32,8 56,48 8,48" fill="none" stroke="rgba(212,175,55,0.6)" stroke-width="0.8"/>
                <polygon points="32,56 8,16 56,16" fill="none" stroke="rgba(0,209,255,0.35)" stroke-width="0.8"/>
                <circle cx="32" cy="32" r="3" fill="rgba(212,175,55,0.5)"/>
            </svg>
        </div>
        <div class="sidebar-title">TTAO</div>
    </div>
    <div class="sidebar-tier" id="sidebar-tier"></div>
    <ul class="sidebar-nav" id="sidebar-nav"></ul>
    <div class="sidebar-footer">
        <button class="logout-btn" id="logout-btn">⬡ Sign Out</button>
    </div>
</nav>

<div class="main-wrap">
    <header class="dash-header">
        <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">☰</button>
        <div class="dash-header-title">The Inner Academy</div>
        <div class="dash-user" id="dash-user"></div>
    </header>
    <main class="dash-content" id="dash-content"></main>
</div>

<script>
function parseJWT(token) {
    try {
        return JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
    } catch { return null; }
}
function getCookie(name) {
    const m = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
    return m ? m[2] : null;
}

// ── CONSTANTS ──
const TIER_RANK = { tyro: 0, initiate: 1, adept: 2, patron: 2 };

const TIERS = {
    tyro:     { label: 'Tyro',     color: 'var(--text-dim)',  nav: ['welcome','articles','discord','stoat','upgrade'] },
    initiate: { label: 'Initiate', color: 'var(--gold-dim)', nav: ['welcome','articles','lessons','discord','stoat','upgrade'] },
    adept:    { label: 'Adept',    color: 'var(--gold)',      nav: ['welcome','articles','lessons','labs','cybermancy','discord','stoat'] },
    patron:   { label: 'Patron',   color: 'var(--cyan)',      nav: ['welcome','articles','lessons','labs','cybermancy','discord','stoat'] },
};

const NAV_ITEMS = {
    welcome:    { icon: '⌂',  label: 'Welcome' },
    articles:   { icon: '📜', label: 'Articles' },
    lessons:    { icon: '⚗',  label: 'Lesson Modules' },
    labs:       { icon: '🧪', label: 'Lab Guides' },
    cybermancy: { icon: '⌬',  label: 'Glyphic Cybermancy' },
    discord:    { icon: '🔗', label: 'Discord' },
    stoat:      { icon: '🦡', label: 'Stoat Community' },
    upgrade:    { icon: '⬡',  label: 'Upgrade' },
};

// ── PERSONAL SEAL & WATERMARK ──
// simpleHash produces a short hex string unique to each Patreon user ID.
// This appears visibly on every article — if content leaks, the seal identifies who shared it.
function simpleHash(str) {
    let h = 0x811c9dc5;
    for (let i = 0; i < str.length; i++) {
        h ^= str.charCodeAt(i);
        h = (h * 0x01000193) >>> 0;
    }
    return h.toString(16).toUpperCase().padStart(8, '0');
}

// encodeZW hides the user ID as invisible zero-width Unicode chars embedded in the article HTML.
// These survive copy-paste even when the visible text looks normal.
function encodeZW(str) {
    return str.split('').map(c =>
        c.charCodeAt(0).toString(2).padStart(8, '0').split('').map(b =>
            b === '1' ? '\u200C' : '\u200B'
        ).join('')
    ).join('\u200D');
}

function renderPersonalSeal(payload, tier) {
    const hash = simpleHash(payload.userId || payload.email || 'unknown');
    const label = (TIERS[tier] || TIERS.tyro).label;
    const isPatron = tier === 'patron';
    return `<div class="personal-seal${isPatron ? ' patron-seal' : ''}">
        <div class="seal-ornament">✦ ✦ ✦</div>
        <div class="seal-main">
            <span class="seal-sigil">⊕</span>
            <span class="seal-name">${payload.name || 'Student'}</span>
            <span class="seal-dot">·</span>
            <span class="seal-tier" style="color:${(TIERS[tier]||TIERS.tyro).color}">${label}</span>
            <span class="seal-dot">·</span>
            <span class="seal-hash">${hash}</span>
        </div>
    </div>`;
}

// ── SCREENSHOT WATERMARK ──
// Renders the member's Patreon ID and email as a diagonal repeating tile across
// the article body at ~5% opacity — invisible to the naked eye under normal viewing
// conditions, but immediately legible when contrast/levels are boosted in any
// photo editing program (Photoshop, GIMP, etc.).
// Generated once per session and reused across all article views.
function generateWatermarkDataUrl(userId, email) {
    try {
        const canvas = document.createElement('canvas');
        // Tile ≈ mobile article width. Displayed at native pixel size (no CSS scaling),
        // so 14px in canvas = 14px on screen. Mobile shows ~1 full tile; desktop ~2.
        const W = 390, H = 160;
        canvas.width = W; canvas.height = H;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, W, H);
        ctx.save();
        ctx.translate(W / 2, H / 2);
        ctx.rotate(-28 * Math.PI / 180);
        ctx.font         = '700 14px "Courier New", monospace';
        ctx.fillStyle    = 'rgba(255,255,255,0.07)';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        const lines  = [userId, email].filter(Boolean);
        const lineH  = 18;
        const groupH = lines.length * lineH + 20;
        // Measure actual text width so columns are snug regardless of ID/email length
        const colW   = Math.max(...lines.map(l => ctx.measureText(l).width)) + 30;
        const diag   = Math.sqrt(W * W + H * H);
        const rows   = Math.ceil(diag / groupH) + 2;
        const cols   = Math.ceil(diag / colW)   + 2;
        for (let r = -rows; r <= rows; r++) {
            for (let c = -cols; c <= cols; c++) {
                lines.forEach((line, i) =>
                    ctx.fillText(line, c * colW, r * groupH + i * lineH));
            }
        }
        ctx.restore();
        return canvas.toDataURL('image/png');
    } catch { return null; }
}

// ── TIER-GATED CONTENT RENDERER ──
// In your markdown, use [gate:initiate] or [gate:adept] on its own line
// to mark where content becomes restricted. Everything before the first
// gate is visible to all. Sections after a gate require that tier or above.
function renderTieredContent(markdown, userTier) {
    const userRank = TIER_RANK[userTier] ?? 0;
    const lines = markdown.split('\n');
    const sections = [];
    let curTier = 'tyro', curLines = [];

    for (const line of lines) {
        const m = line.match(/^\[gate:(tyro|initiate|adept)\]$/);
        if (m) {
            sections.push({ tier: curTier, lines: curLines });
            curTier = m[1]; curLines = [];
        } else {
            curLines.push(line);
        }
    }
    sections.push({ tier: curTier, lines: curLines });

    return sections.map(sec => {
        const content = sec.lines.join('\n').trim();
        if (!content) return '';
        if ((TIER_RANK[sec.tier] ?? 0) <= userRank) {
            return `<div class="article-section">${marked.parse(content)}</div>`;
        }
        const label = sec.tier.charAt(0).toUpperCase() + sec.tier.slice(1);
        return `<div class="article-gate">
            <div class="gate-icon">⚿</div>
            <div class="gate-title">Continue as ${label}</div>
            <div class="gate-desc">This section requires ${label} membership to read.</div>
            <a href="https://www.patreon.com/Astrust" class="btn btn-gold" target="_blank" rel="noopener">Upgrade on Patreon</a>
        </div>`;
    }).join('');
}

// ── CONTENT LIST LOADER ──
function loadContentList(contentType, wrapId, renderCard, panelId) {
    fetch(`/api/articles?contentType=${contentType}`)
        .then(r => { if (!r.ok) throw r.status; return r.json(); })
        .then(list => {
            const wrap = document.getElementById(wrapId);
            if (!wrap) return;
            if (!Array.isArray(list) || !list.length) {
                wrap.innerHTML = '<p style="opacity:0.5;font-style:italic">Nothing published in this section yet.</p>';
                return;
            }
            const gridClass = contentType === 'cybermancy' ? 'glyph-grid' : 'card-grid';
            wrap.innerHTML = `<div class="${gridClass}">${list.map(renderCard).join('')}</div>`;
            wrap.addEventListener('click', e => {
                const card = e.target.closest('[data-content-id]');
                if (card) showContent(card.dataset.contentId, panelId);
            });
        })
        .catch(err => {
            const wrap = document.getElementById(wrapId);
            if (wrap) wrap.innerHTML = `<p class="error-state">Failed to load: ${err}</p>`;
        });
}

// ── CARD RENDERERS ──
function renderArticleCard(item) {
    return `<div class="card" data-content-id="${item.id}">
        <div class="card-title">${item.title}</div>
        <div class="card-desc">${item.excerpt || ''}</div>
        <span class="card-link">Read →</span>
    </div>`;
}
function renderModuleCard(item) {
    return `<div class="card" data-content-id="${item.id}">
        ${item.moduleNumber ? `<div class="card-label">${item.moduleNumber}</div>` : ''}
        <div class="card-title">${item.title}</div>
        <div class="card-desc">${item.excerpt || ''}</div>
        <span class="card-link">Begin →</span>
    </div>`;
}
function renderLabCard(item) {
    return `<div class="card" data-content-id="${item.id}">
        ${item.bulletinNumber ? `<div class="card-label">${item.bulletinNumber}</div>` : ''}
        <div class="card-title">${item.title}</div>
        <div class="card-desc">${item.excerpt || ''}</div>
        <span class="card-link">Begin →</span>
    </div>`;
}
function renderCybermancyCard(item) {
    return `<div class="glyph-card" data-content-id="${item.id}" style="cursor:pointer">
        <div class="glyph-symbol">${item.glyph || '◎'}</div>
        <div class="glyph-name">${item.title}</div>
        <div class="glyph-desc">${item.excerpt || ''}</div>
    </div>`;
}

// ── CONTENT PANELS ──
// All dynamic panels: no hardcoded content, everything comes from the API
function buildContent(payload, tier) {
    return {
        welcome: () => `
            <div class="panel fade-in">
                <div class="panel-eyebrow">Welcome</div>
                <h1 class="panel-title">Salve, ${payload.name || 'Soror/Frater'}.</h1>
                <p class="panel-lead">You have entered the Inner Academy of the Ternary Alchemical Order as a <strong>${TIERS[tier].label}</strong>. The Great Work awaits.</p>
                ${tier === 'patron' ? `
                <div class="upgrade-notice" style="border-color:rgba(0,209,255,0.2);background:rgba(0,209,255,0.03)">
                    <p>Your patronage sustains the Temple and its Work. Every resource of the Order is open to you. We are sincerely grateful.</p>
                </div>` : ''}
                ${tier === 'tyro' ? `
                <div class="upgrade-notice">
                    <p>Unlock the full curriculum — lesson modules, lab guides, and community access — by upgrading your Patreon membership.</p>
                    <a href="https://www.patreon.com/Astrust" class="btn btn-gold" target="_blank" rel="noopener">Upgrade on Patreon</a>
                </div>` : ''}
                ${tier === 'initiate' ? `
                <div class="upgrade-notice">
                    <p>Adept tier unlocks lab guides, Glyphic Cybermancy modules, and the Stoat community.</p>
                    <a href="https://www.patreon.com/Astrust" class="btn btn-gold" target="_blank" rel="noopener">Become an Adept</a>
                </div>` : ''}
            </div>`,

        articles: () => {
            requestAnimationFrame(() => loadContentList('articles', 'articles-wrap', renderArticleCard, 'articles'));
            return `<div class="panel fade-in">
                <div class="panel-eyebrow">Articles</div>
                <h1 class="panel-title">The Archive</h1>
                <p class="panel-lead">Foundational writings of the Order, accessible to enrolled students.</p>
                <div id="articles-wrap"><div class="loading">Loading...</div></div>
            </div>`;
        },

        lessons: () => {
            requestAnimationFrame(() => loadContentList('lessons', 'lessons-wrap', renderModuleCard, 'lessons'));
            return `<div class="panel fade-in">
                <div class="panel-eyebrow">Lesson Modules</div>
                <h1 class="panel-title">The Curriculum</h1>
                <p class="panel-lead">Structured study modules progressing from foundation to advanced practice.</p>
                <div id="lessons-wrap"><div class="loading">Loading...</div></div>
            </div>`;
        },

        labs: () => {
            requestAnimationFrame(() => loadContentList('labs', 'labs-wrap', renderLabCard, 'labs'));
            return `<div class="panel fade-in">
                <div class="panel-eyebrow">Laboratory Guides</div>
                <h1 class="panel-title">The Alchemical Laboratories</h1>
                <p class="panel-lead">Step-by-step practical bulletins for Plant, Animal, and Metal operations.</p>
                <div id="labs-wrap"><div class="loading">Loading...</div></div>
            </div>`;
        },

        cybermancy: () => {
            requestAnimationFrame(() => loadContentList('cybermancy', 'cybermancy-wrap', renderCybermancyCard, 'cybermancy'));
            return `<div class="panel fade-in">
                <div class="panel-eyebrow">Glyphic Cybermancy</div>
                <h1 class="panel-title">The Cybermantic System</h1>
                <p class="panel-lead">Custom-engineered systems blending alchemical symbolism and digital technology.</p>
                <div id="cybermancy-wrap"><div class="loading">Loading...</div></div>
            </div>`;
        },

        discord: () => `
            <div class="panel fade-in">
                <div class="panel-eyebrow">Community</div>
                <h1 class="panel-title">Discord Sanctums</h1>
                <p class="panel-lead">Gated channels for enrolled students of the Order.</p>
                <div class="link-card">
                    <div class="link-card-icon">💬</div>
                    <div class="link-card-body">
                        <div class="link-card-title">Join the Discord</div>
                        <div class="link-card-desc">Access tier-gated channels for discussion, questions, and community practice.</div>
                        <a href="#" class="btn btn-cyan" target="_blank" rel="noopener">Open Discord</a>
                    </div>
                </div>
            </div>`,

        stoat: () => `
            <div class="panel fade-in">
                <div class="panel-eyebrow">Community</div>
                <h1 class="panel-title">Stoat Community</h1>
                <p class="panel-lead">The Order's home on Stoat — reserved for Adept members.</p>
                <div class="link-card">
                    <div class="link-card-icon">🦡</div>
                    <div class="link-card-body">
                        <div class="link-card-title">Join the Stoat</div>
                        <div class="link-card-desc">Deeper discussion, long-form posts, and archival lore for advanced students.</div>
                        <a href="#" class="btn btn-cyan" target="_blank" rel="noopener">Open Stoat</a>
                    </div>
                </div>
            </div>`,

        upgrade: () => `
            <div class="panel fade-in">
                <div class="panel-eyebrow">Upgrade</div>
                <h1 class="panel-title">Advance Your Degree</h1>
                <p class="panel-lead">Deepen your access to the Work.</p>
                <div class="upgrade-grid">
                    ${tier === 'tyro' ? `
                    <div class="upgrade-card highlight">
                        <div class="upgrade-tier">Initiate</div>
                        <div class="upgrade-price">$5 <span>/mo</span></div>
                        <ul class="upgrade-perks">
                            <li>All Tyro content</li>
                            <li>Full lesson modules</li>
                            <li>Step-by-step alchemical guides</li>
                            <li>Gated Discord channels</li>
                        </ul>
                        <a href="https://www.patreon.com/Astrust" class="btn btn-gold" target="_blank">Become an Initiate</a>
                    </div>` : ''}
                    <div class="upgrade-card ${tier === 'initiate' ? 'highlight' : ''}">
                        <div class="upgrade-tier">Adept</div>
                        <div class="upgrade-price">$15 <span>/mo</span></div>
                        <ul class="upgrade-perks">
                            <li>All Initiate content</li>
                            <li>Full lab guide bulletins</li>
                            <li>Glyphic Cybermancy modules</li>
                            <li>Stoat community access</li>
                        </ul>
                        <a href="https://www.patreon.com/Astrust" class="btn btn-gold" target="_blank">Become an Adept</a>
                    </div>
                </div>
            </div>`,
    };
}

// ── INIT ──
function init() {
    const token = getCookie('ttao_session');
    if (!token) { window.location.href = '/?auth=required'; return; }

    const payload = parseJWT(token);
    if (!payload || payload.exp * 1000 < Date.now()) { window.location.href = '/?auth=expired'; return; }

    // Preview mode: admin can open dashboard with ?preview_tier= to simulate any tier
    const adminCookie = getCookie('ttao_admin');
    const previewParam = new URLSearchParams(window.location.search).get('preview_tier');
    const isPreview = !!(adminCookie && previewParam && TIER_RANK[previewParam] !== undefined);
    const tier = isPreview ? previewParam : (payload.tier || 'tyro');

    if (isPreview) {
        const banner = document.createElement('div');
        banner.className = 'preview-banner';
        banner.innerHTML = `⚗ Preview Mode — Viewing as <strong>${tier.toUpperCase()}</strong> &nbsp;·&nbsp; <a href="/admin">← Admin Panel</a>`;
        document.body.prepend(banner);
        document.querySelector('.main-wrap').style.marginTop = '30px';
    }

    // Generate screenshot watermark once for this entire session.
    // Stored in closure — applied to every article body the member views.
    const wmDataUrl = generateWatermarkDataUrl(
        payload.userId || '',
        payload.email  || ''
    );

    const tierConfig = TIERS[tier] || TIERS.tyro;
    const CONTENT = buildContent(payload, tier);

    // Sidebar tier badge
    document.getElementById('sidebar-tier').innerHTML =
        `<span class="tier-badge" style="color:${tierConfig.color}">${tierConfig.label}</span>`;

    // Sidebar nav
    const nav = document.getElementById('sidebar-nav');
    nav.innerHTML = tierConfig.nav.map(id => `
        <li>
            <button class="nav-item" data-panel="${id}">
                <span class="nav-icon">${NAV_ITEMS[id].icon}</span>
                <span class="nav-label">${NAV_ITEMS[id].label}</span>
            </button>
        </li>`).join('');

    document.getElementById('dash-user').innerHTML =
        `<span class="user-name">${payload.name || payload.email || 'Student'}</span>`;

    // ── SHOW PANEL ──
    function showPanel(id) {
        // Remove watermark overlay when leaving an article
        document.getElementById('wm-overlay')?.remove();
        document.querySelectorAll('.nav-item').forEach(btn =>
            btn.classList.toggle('active', btn.dataset.panel === id));
        document.getElementById('dash-content').innerHTML = CONTENT[id]
            ? CONTENT[id]()
            : '<div class="panel"><p>Coming soon.</p></div>';
    }

    // ── SHOW CONTENT (article reader for all content types) ──
    function showContent(id, backPanel) {
        document.getElementById('dash-content').innerHTML =
            '<div class="panel"><div class="loading">Loading...</div></div>';
        fetch(`/api/articles?id=${encodeURIComponent(id)}`)
            .then(r => { if (!r.ok) throw r.status; return r.json(); })
            .then(item => {
                let eyebrow = '<div class="panel-eyebrow">Article</div>';
                if (item.moduleNumber)  eyebrow = `<div class="panel-eyebrow">${item.moduleNumber}</div>`;
                if (item.bulletinNumber) eyebrow = `<div class="panel-eyebrow">${item.bulletinNumber}</div>`;
                if (item.glyph && !item.moduleNumber && !item.bulletinNumber) {
                    eyebrow = `<div class="glyph-symbol" style="font-size:2rem;margin-bottom:0.8rem;display:block">${item.glyph}</div>`;
                }
                document.getElementById('dash-content').innerHTML = `
                    <div class="panel fade-in">
                        <button class="back-btn" id="back-btn">← Back</button>
                        ${eyebrow}
                        <h1 class="panel-title">${item.title}</h1>
                        <div class="article-body">
                            <span style="position:absolute;opacity:0;font-size:0;user-select:none" aria-hidden="true">${encodeZW(payload.userId||'')}</span>
                            ${renderTieredContent(item.content, tier)}
                        </div>
                        ${renderPersonalSeal(payload, tier)}
                    </div>`;
                document.getElementById('back-btn').onclick = () => showPanel(backPanel || 'articles');

                // Mount fixed-position watermark overlay. position:fixed means it stays
                // locked to the viewport as the user scrolls — it does not move with content.
                // Removed automatically when showPanel() is called (back navigation).
                if (wmDataUrl) {
                    document.getElementById('wm-overlay')?.remove();
                    const ov = document.createElement('div');
                    ov.id = 'wm-overlay';
                    ov.style.cssText = [
                        'position:fixed', 'inset:0',
                        'pointer-events:none', 'z-index:9999',
                        `background-image:url(${wmDataUrl})`,
                        'background-repeat:repeat',
                        'background-size:390px auto',
                    ].join(';');
                    document.body.appendChild(ov);
                }
            })
            .catch(() => {
                document.getElementById('dash-content').innerHTML =
                    '<div class="panel"><p class="error-state">Failed to load content.</p></div>';
            });
    }

    // Nav clicks
    nav.addEventListener('click', e => {
        const btn = e.target.closest('.nav-item');
        if (!btn) return;
        showPanel(btn.dataset.panel);
        if (window.innerWidth <= 768) closeSidebar();
    });

    // Logout
    document.getElementById('logout-btn').addEventListener('click', () => {
        document.cookie = 'ttao_session=; Path=/; Max-Age=0';
        window.location.href = '/';
    });

    // Mobile sidebar
    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebar-overlay').classList.remove('open');
    }
    document.getElementById('menu-toggle').addEventListener('click', () => {
        document.getElementById('sidebar').classList.add('open');
        document.getElementById('sidebar-overlay').classList.add('open');
    });
    document.getElementById('sidebar-overlay').addEventListener('click', closeSidebar);

    showPanel('welcome');
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
